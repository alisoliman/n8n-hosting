apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-mcp
  labels:
    app: hello-world-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-world-mcp
  template:
    metadata:
      labels:
        app: hello-world-mcp
    spec:
      containers:
      - name: mcp-server
        image: your-registry.azurecr.io/hello-world-mcp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
